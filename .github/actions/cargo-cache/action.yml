name: Cargo cache

inputs:
  scope:
    description: Cache namespace.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/cache@v5
      with:
        path: |
          .cache/cargo
          .cache/target
        key: job-${{ inputs.scope }}-${{ hashFiles('Cargo.toml', 'rust-toolchain.toml') }}
