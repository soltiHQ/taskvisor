# Configures GitHub's auto-generated release notes
# (consumed by `generate_release_notes: true` in .github/workflows/release.yml).
#
# Categorization is driven by PR labels — apply them before merging.
# PRs with no matching label fall through to "Other changes".

changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Dependencies
      labels:
        - dependencies
        - deps
    - title: CI / Build
      labels:
        - ci
        - build
    - title: Other changes
      labels:
        - "*"
