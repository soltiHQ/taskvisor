name: Commit

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - "CODE_OF_CONDUCT.md"
      - "README.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/*"
      - ".github/pull_request_template.md"

concurrency:
  group: commit-${{ github.ref }}
  cancel-in-progress: true

permissions: {
  contents: read,
  actions: write
}

jobs:
  checks:
    name: Run
    uses: ./.github/workflows/.checks.yml

  commit-check:
    name: Commit Check
    if: always()
    needs: checks
    runs-on: ubuntu-24.04
    steps:
      - name: Verify results
        env:
          RESULT: ${{ needs.checks.result }}
        run: |
          set -euo pipefail
          if [ "$RESULT" != "success" ]; then
            echo "::error::checks result: $RESULT"
            exit 1
          fi
          echo "All Commit checks completed successfully!"
