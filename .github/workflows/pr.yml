name: Pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: {
  contents: read,
  actions: write
}

jobs:
  audit:
    name: Audit
    uses: ./.github/workflows/.audit.yml

  docs:
    name: Docs
    needs: [audit]
    uses: ./.github/workflows/.docs.yml

  build:
    name: Build examples
    needs: [audit]
    uses: ./.github/workflows/.build.yml

  preflight:
    name: Preflight
    needs: [audit]
    uses: ./.github/workflows/.preflight.yml

  pr-check:
    name: Pr Check
    if: always()
    needs: [audit, docs, build, preflight]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS" | jq .
          bad=$(echo "$RESULTS" | jq -r 'to_entries[] | select(.value.result != "success") | .key')
          if [ -n "$bad" ]; then
            echo "::error::Jobs not successful: $bad"
            exit 1
          fi
          echo "All Pr checks completed successfully!"
