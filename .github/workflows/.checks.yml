name: Checks

on: { workflow_call: {} }

jobs:
  fmt:
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - uses: actions/checkout@v6
      - name: Run fmt
        uses: soltiHQ/actions/taskfile@main
        with: { command: ci/fmt }

  check:
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - uses: actions/checkout@v6
      - name: Run check
        uses: soltiHQ/actions/taskfile@main
        with: { command: ci/check }

  unittest:
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cargo-cache
        with: { scope: unittest }
      - name: Run Job
        uses: soltiHQ/actions/taskfile@main
        with: { command: ci/test-unit }

  integration:
    runs-on: ${{ vars.RUNS_ON }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cargo-cache
        with: { scope: integration }
      - name: Run Job
        uses: soltiHQ/actions/taskfile@main
        with: { command: ci/test-integration }

  clippy-features:
    runs-on: ${{ vars.RUNS_ON }}
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        shell: bash
        run: |
          feats=$(awk '
            /^\[features\]/ { f = 1; next }
            /^\[/           { f = 0 }
            f && /=/        { if ($1 != "default") print $1 }
          ' Cargo.toml)
          matrix=$(printf 'none\n%s\nall\n' "$feats" | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  clippy:
    needs: clippy-features
    runs-on: ${{ vars.RUNS_ON }}
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.clippy-features.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cargo-cache
        with:
          scope: clippy-${{ matrix.feature }}
      - name: Run Job
        uses: soltiHQ/actions/taskfile@main
        with:
          command: ci/clippy FEATURE=${{ matrix.feature }}
