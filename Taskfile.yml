version: '3'

includes:
  rust:
    taskfile: https://raw.githubusercontent.com/soltiHQ/actions/main/taskfiles/rust/Taskfile.yml
    vars:
      image_patch: "-1"

tasks:
  ci/fmt:
    desc: Run 'cargo fmt --check'.
    cmds:
      - task: rust:fmt

  ci/check:
    desc: Run 'cargo check'.
    cmds:
      - task: rust:check

  ci/clippy:
    desc: "Run 'cargo clippy' for one feature set. FEATURE = none|all|<feature-name> (default: all)."
    vars:
      FEATURE: '{{.FEATURE | default "all"}}'
      FEATURE_FLAGS:
        sh: |
          case "{{.FEATURE}}" in
            none) echo '--no-default-features' ;;
            all)  echo '--all-features' ;;
            *)    echo "--no-default-features --features {{.FEATURE}}" ;;
          esac
    cmds:
      - task: rust:clippy
        vars: { CLIPPY_ARGS: '--all {{.FEATURE_FLAGS}} -- -D warnings' }

  ci/test:
    desc: Run 'cargo test' (all targets, all features).
    cmds:
      - task: rust:test

  ci/test-unit:
    desc: Run unit tests ('cargo test --lib') and doctests ('cargo test --doc').
    cmds:
      - task: rust:test
        vars: { TEST_ARGS: '--lib --all-features' }
      - task: rust:test
        vars: { TEST_ARGS: '--doc --all-features' }

  ci/test-integration:
    desc: Run integration tests ('cargo test --test "*"').
    cmds:
      - task: rust:test
        vars: { TEST_ARGS: '--test "*" --all-features' }

  ci/audit:
    desc: Run 'cargo audit'.
    cmds:
      - task: rust:audit

  ci/docs:
    desc: Run 'rustdoc' for the taskvisor crate.
    cmds:
      - task: rust:docs
        vars:
          DOCS_ARGS: '--features "logging controller"'

  ci/build:
    desc: Build a taskvisor example. Pass CRATE = example name.
    requires:
      vars: [ CRATE ]
    cmds:
      - task: rust:build
        vars:
          CRATE: "taskvisor"
          BUILD_ARGS: '--example {{.CRATE}} --all-features'

  ci/publish-dry-run:
    desc: Simulate 'cargo publish' for the taskvisor crate.
    cmds:
      - task: rust:publish-dry-run
        vars:
          CRATE: "taskvisor"

  rust:benchmark:
    desc: Run 'cargo bench'.
    cmds:
      - task: rust:bench
